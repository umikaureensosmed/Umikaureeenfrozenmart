<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frozen Food Mart Umi Kaureen</title>
    <style>
        /* --- RESET & BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0b5ed7;
            /* Efek Salju Bergerak */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.2) 1.5px, transparent 1.5px),
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.1) 2px, transparent 2px),
                linear-gradient(180deg, #0b5ed7, #084298);
            background-size: 100px 100px, 200px 200px, 100% 100%;
            animation: snowMove 12s linear infinite;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        @keyframes snowMove {
            from { background-position: 0 0, 0 0, 0 0; }
            to { background-position: 100px 100px, 200px 400px, 0 0; }
        }

        /* --- HEADER & NAVBAR --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid #fff;
            object-fit: cover;
        }

        .brand-name {
            font-weight: bold;
            font-size: 1.3rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 10px;
        }

        .nav-links li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 20px;
            position: relative;
            transition: 0.3s;
            z-index: 1;
            font-size: 14px;
        }

        /* --- EFEK STABILO --- */
        .nav-links li a::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: #a3d8ff;
            transition: 0.3s ease;
            z-index: -1;
            border-radius: 4px;
        }

        .nav-links li a:hover::before {
            width: 100%;
        }

        .nav-links li a:hover {
            color: #084298;
        }

        /* --- HERO SECTION --- */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero h2 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            animation: fadeInDown 1s ease;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 30px;
            opacity: 0.9;
            animation: fadeInUp 1s ease 0.5s backwards;
        }

        .btn-cta {
            padding: 15px 35px;
            background: #a3d8ff;
            color: #084298;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease 1s backwards;
        }

        .btn-cta:hover {
            transform: scale(1.1);
            background: #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* --- ANIMASI --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .header-container { flex-direction: column; padding: 15px; gap: 15px; }
            .hero h2 { font-size: 2rem; }
            .nav-links li a { padding: 8px 10px; }
        }
    </style>
</head>
<body>

<header class="header-container">
    <div class="logo-area">
        <img src="https://drive.google.com/thumbnail?export=view&id=1xrWVIlRFOeZTwemcvSmC8Oz7DsZH1YbG" alt="Logo">
        <span class="brand-name">Umi Kaureen</span>
    </div>

    <nav>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="PROFILE.html">PROFILE</a></li>
            <li><a href="produk.html">PRODUK</a></li>
            <li><a href="tentang.html">TENTANG</a></li>
    </nav>
</header>

<main class="hero">
    <h2>Frozen Food Mart</h2>
    <p>Menyediakan berbagai macam makanan beku berkualitas, higienis, dan harga terjangkau untuk kebutuhan keluarga Anda.</p>
    <a href="produk.html" class="btn-cta">Lihat Katalog Produk</a>
</main>

<footer>
    <p>© 2026 Frozen Food Mart Umi Kaureen. All Rights Reserved.</p>
</footer>

</body>
</html>
